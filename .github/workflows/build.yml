name: PlatformIO Build + SBOM (Secure)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-with-sbom:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO
        run: |
          pip install --upgrade platformio
          # Get the full path to pio binary
          PIO_PATH=$(which pio)
          echo "PlatformIO installed at: $PIO_PATH"
          $PIO_PATH --version
          # Set PATH for use in later steps
          echo "PIO_PATH=$PIO_PATH" >> $GITHUB_ENV

      - name: Install observer-cli
        run: |
          echo "Fetching latest observer-cli release..."
          RELEASES_JSON=$(curl -s https://api.github.com/repos/sbom-observer/observer-cli/releases/latest)
          
          OBSERVER_VERSION=$(echo "$RELEASES_JSON" | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Detected version: $OBSERVER_VERSION"
          
          if [ -z "$OBSERVER_VERSION" ]; then
            echo "ERROR: Could not detect observer version"
            exit 1
          fi
          
          # Extract version number without 'v' prefix
          VERSION_NUMBER=${OBSERVER_VERSION#v}
          
          # Download .deb package for Ubuntu/Linux
          DOWNLOAD_URL="https://github.com/sbom-observer/observer-cli/releases/download/${OBSERVER_VERSION}/observer_${VERSION_NUMBER}_amd64.deb"
          echo "Download URL: $DOWNLOAD_URL"
          
          curl -L -f --max-time 30 "$DOWNLOAD_URL" -o /tmp/observer.deb
          
          if [ ! -f /tmp/observer.deb ] || [ ! -s /tmp/observer.deb ]; then
            echo "ERROR: Failed to download observer-cli"
            echo "File size: $([ -f /tmp/observer.deb ] && stat -c%s /tmp/observer.deb || echo 'FILE NOT FOUND')"
            exit 1
          fi
          
          sudo dpkg -i /tmp/observer.deb
          observer --version

      # ✅ SECURE: Pass secrets as environment variables
      # They are automatically masked in logs
      - name: Build with SBOM
        env:
          # These secrets are injected at runtime
          # GitHub automatically masks them in logs (even if accidentally printed)
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASS: ${{ secrets.WIFI_PASS }}
          WIFI_USER: ${{ secrets.WIFI_USER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a temporary header file with secrets
          # This file is NOT committed to git
          cat > include/wifi_config.h << 'EOF'
          #ifndef WIFI_CONFIG_H
          #define WIFI_CONFIG_H
          
          #define WIFI_SSID "${{ env.WIFI_SSID }}"
          #define WIFI_PASS "${{ env.WIFI_PASS }}"
          #define WIFI_USER "${{ env.WIFI_USER }}"
          #define GITHUB_TOKEN "${{ env.GITHUB_TOKEN }}"
          
          #endif
          EOF
          
          # Build firmware with observer SBOM
          BUILD_STATUS=0
          if command -v observer &> /dev/null; then
            echo "Building with observer SBOM..."
            # observer build: -b for SBOM output, -u for user
            sudo observer build \
              -b sbom.cdx.json \
              -u runner \
              -- ${{ env.PIO_PATH }} run -e m5stick-c || BUILD_STATUS=$?
          else
            echo "observer-cli not available, building without SBOM wrapper..."
            ${{ env.PIO_PATH }} run -e m5stick-c || BUILD_STATUS=$?
          fi

          # Always clean up sensitive file before next step
          echo "Cleaning up sensitive files..."
          rm -f include/wifi_config.h
          
          # Return build status
          exit $BUILD_STATUS

      # ✅ SAFE: Verify build succeeded before uploading
      - name: Verify build artifacts
        if: success()
        run: |
          echo "=== Build Artifacts ==="
          ls -lh .pio/build/m5stick-c/firmware.bin || echo "✗ Firmware not found"
          echo ""
          echo "=== SBOM Output ==="
          if [ -f sbom.cdx.json ]; then
            echo "✓ sbom.cdx.json generated:"
            wc -c sbom.cdx.json
            echo "Sample (first 30 lines):"
            head -30 sbom.cdx.json
          else
            echo "✗ sbom.cdx.json not found"
            ls -la | grep sbom || echo "No SBOM files at all"
          fi

      # ⚠️ CRITICAL: Clean up any sensitive files before uploads
      - name: Clean up sensitive files
        if: always()
        run: |
          echo "Ensuring no sensitive files remain..."
          rm -f include/wifi_config.h
          echo "Sensitive files cleaned"

      # ⚠️ IMPORTANT: Don't upload sensitive files
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware
          path: .pio/build/m5stick-c/firmware.bin

      - name: Upload SBOM (if generated)
        uses: actions/upload-artifact@v4
        if: success() && hashFiles('sbom.cdx.json') != ''
        with:
          name: sbom
          path: sbom.cdx.json
